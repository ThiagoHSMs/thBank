# Troque localhost por host.docker.internal
spring.datasource.url=jdbc:postgresql://db:5432/wallet_db
spring.datasource.username=postgres
spring.datasource.password=123456
# 2. Driver do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Configurações do Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 4. Configuração do Flyway (se você estiver usando para migrações)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

server.error.include-message=always
server.error.include-stacktrace=always